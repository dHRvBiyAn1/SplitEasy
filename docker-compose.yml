services:
  postgres:
    image: postgres:16-alpine
    container_name: spliteasy-postgres
    environment:
      POSTGRES_DB: spliteasy
      POSTGRES_USER: spliteasy
      POSTGRES_PASSWORD: spliteasy
    ports:
      # Host port 5433: this machine already runs a system Postgres on 5432.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spliteasy -d spliteasy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
