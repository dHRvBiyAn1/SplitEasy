spring.application.name=spliteasy
# Local dev runs under the "dev" profile by default (supplies app.jwt.secret).
# Non-dev environments must set SPRING_PROFILES_ACTIVE (or leave it) AND provide
# APP_JWT_SECRET themselves; boot fails fast if the secret is missing.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- Database (local dev; matches docker-compose.yml at repo root) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/spliteasy
spring.datasource.username=spliteasy
spring.datasource.password=spliteasy

# Schema is owned by Flyway migrations (src/main/resources/db/migration);
# Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- JWT (HS256, symmetric secret) ---
# No default: any non-dev environment MUST provide APP_JWT_SECRET (raw UTF-8,
# >= 32 chars / 256 bits for HS256) or the app fails to boot. The dev value
# lives in application-dev.properties, active under the "dev" profile.
app.jwt.secret=${APP_JWT_SECRET}
# Issuer claim, validated on decode so signing and validation can't drift.
app.jwt.issuer=spliteasy
# Access-token lifetime in seconds (1 hour). No refresh token yet (see AGENTS.md TODO).
app.jwt.expiration-seconds=3600

# --- CORS ---
# Comma-separated allowed origins for /api/**. Dev default is the Angular dev server;
# override in non-dev environments with the real frontend origin(s).
app.cors.allowed-origins=http://localhost:4200
