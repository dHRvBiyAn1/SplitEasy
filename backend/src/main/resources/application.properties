spring.application.name=spliteasy

# --- Database (local dev; matches docker-compose.yml at repo root) ---
spring.datasource.url=jdbc:postgresql://localhost:5433/spliteasy
spring.datasource.username=spliteasy
spring.datasource.password=spliteasy

# Schema is owned by Flyway migrations (src/main/resources/db/migration);
# Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
