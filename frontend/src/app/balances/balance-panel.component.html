<section class="bal">
  <h2 class="bal__title">Balances</h2>

  @if (loading()) {
    <div class="dc-loading" role="status" aria-label="Loading balances"></div>
  } @else if (error()) {
    <p class="bal__error" role="alert">{{ error() }}</p>
  } @else {
    <ul class="bal__list dc-card">
      @for (b of balances(); track b.user.id) {
        <li class="bal__row">
          <span class="dc-avatar bal__av" aria-hidden="true">{{ initials(b.user.displayName) }}</span>
          <span class="bal__name">{{ b.user.displayName }}</span>
          <span
            class="bal__amount dc-amount"
            [class.dc-amount--owed]="b.netCents > 0"
            [class.dc-amount--owes]="b.netCents < 0"
            [class.dc-amount--settled]="b.netCents === 0"
            >{{ describe(b.netCents) }}</span
          >
          @if (b.netCents !== 0) {
            <button class="dc-btn-outline bal__settle" type="button" (click)="settle(b)">Settle up</button>
          }
        </li>
      }
    </ul>
  }
</section>
