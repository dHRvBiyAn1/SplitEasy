@if (!isAuthRoute()) {
  <header class="topbar">
    <a routerLink="/" class="topbar__brand">
      <span class="topbar__mark" aria-hidden="true">=</span>
      <span class="topbar__word">{{ title() }}</span>
    </a>

    <span class="topbar__spacer"></span>

    <span class="topbar__status" [class]="'is-' + backendStatus()" title="Backend health">
      <span class="topbar__dot" aria-hidden="true"></span>{{ backendStatus() }}
    </span>

    @if (isAuthenticated()) {
      <span class="topbar__user">{{ user()?.displayName }}</span>
      <button class="dc-btn-outline topbar__btn" type="button" (click)="logout()">Log out</button>
    } @else {
      <a class="dc-btn-outline topbar__btn" routerLink="/login">Log in</a>
      <a class="dc-btn-accent topbar__btn" routerLink="/register">Sign up</a>
    }
  </header>
}

<main class="app-content" [class.app-content--auth]="isAuthRoute()">
  <router-outlet />
</main>
