<mat-toolbar color="primary" class="app-toolbar">
  <a routerLink="/" class="brand">{{ title() }}</a>
  <span class="spacer"></span>
  <span class="backend-status" [class]="'status-' + backendStatus()" title="Backend health">
    ● {{ backendStatus() }}
  </span>
  @if (isAuthenticated()) {
    <span class="current-user">{{ user()?.displayName }}</span>
    <button mat-button (click)="logout()">Log out</button>
  } @else {
    <a mat-button routerLink="/login">Log in</a>
    <a mat-button routerLink="/register">Register</a>
  }
</mat-toolbar>

<main class="app-content">
  <router-outlet />
</main>
