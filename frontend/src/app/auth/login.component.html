<div class="auth">
  <app-auth-hero class="auth__hero" />

  <div class="auth__panel">
    <div class="auth__form-wrap">
      <h2 class="dc-display auth__title">Welcome back</h2>

      <nav class="auth__tabs" aria-label="Authentication">
        <a routerLink="/login" class="auth__tab" aria-current="page">Log in</a>
        <a routerLink="/register" class="auth__tab">Sign up</a>
      </nav>

      @if (submitting()) {
        <div class="dc-loading" role="status" aria-label="Signing in"></div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" novalidate>
        <input
          class="dc-field"
          type="email"
          formControlName="email"
          placeholder="Email"
          aria-label="Email"
          autocomplete="email"
        />
        <input
          class="dc-field"
          type="password"
          formControlName="password"
          placeholder="Password"
          aria-label="Password"
          autocomplete="current-password"
        />

        @if (error()) {
          <p class="auth__error" role="alert">{{ error() }}</p>
        }

        <button class="dc-btn-accent auth__submit" type="submit" [disabled]="submitting()">
          Log in
        </button>
      </form>

      <p class="auth__switch">
        New to SplitEasy? <a routerLink="/register">Create an account</a>
      </p>
    </div>
  </div>
</div>
