<div class="auth">
  <app-auth-hero class="auth__hero" />

  <div class="auth__panel">
    <div class="auth__form-wrap">
      <h2 class="dc-display auth__title">Create your account</h2>

      <nav class="auth__tabs" aria-label="Authentication">
        <a routerLink="/login" class="auth__tab">Log in</a>
        <a routerLink="/register" class="auth__tab" aria-current="page">Sign up</a>
      </nav>

      @if (submitting()) {
        <div class="dc-loading" role="status" aria-label="Creating your account"></div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" novalidate>
        <input
          class="dc-field"
          type="text"
          formControlName="displayName"
          placeholder="Full name"
          aria-label="Full name"
          autocomplete="name"
        />
        <input
          class="dc-field"
          type="email"
          formControlName="email"
          placeholder="Email"
          aria-label="Email"
          autocomplete="email"
        />
        <input
          class="dc-field"
          type="password"
          formControlName="password"
          placeholder="Password"
          aria-label="Password"
          autocomplete="new-password"
        />
        <p class="auth__hint">At least 8 characters</p>

        @if (error()) {
          <p class="auth__error" role="alert">{{ error() }}</p>
        }

        <button class="dc-btn-accent auth__submit" type="submit" [disabled]="submitting()">
          Create account
        </button>
      </form>

      <p class="auth__switch">Already have an account? <a routerLink="/login">Log in</a></p>
    </div>
  </div>
</div>
